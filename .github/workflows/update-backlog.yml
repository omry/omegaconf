name: Update Backlog
run-name: "backlog: ${{ github.event_name }}.${{ github.event.action }} #${{ github.event.issue.number || github.event.pull_request.number || 'n/a' }} ${{ github.event.issue.title || github.event.pull_request.title }}"

on:
  issues:
    types: [opened, closed, labeled, unlabeled, reopened]
  pull_request:
    types: [opened, closed, labeled, unlabeled, reopened]
  schedule:
    - cron: '0 7 * * *'  # daily at 7am UTC as a fallback
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  # Logs the triggering event to events.jsonl on the backlog branch.
  # Runs immediately on every issue/PR event, independent of the process job.
  log-event:
    if: github.event_name == 'issues' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: backlog
          path: backlog-branch

      - name: Append event to log
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg event "$EVENT_NAME" \
            --arg action "$EVENT_ACTION" \
            --arg number "$ISSUE_NUMBER" \
            '{ts: $ts, event: $event, action: $action, number: $number}' \
            >> backlog-branch/events.jsonl

      - name: Push event log (with rebase retry for concurrent appends)
        run: |
          cd backlog-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.jsonl
          git diff --cached --quiet && exit 0
          git commit -m "event: ${{ github.event_name }}.${{ github.event.action }} #${{ github.event.issue.number || github.event.pull_request.number }}"
          for i in 1 2 3; do
            git pull --rebase origin backlog && git push && break
            sleep $((i * 3))
          done

  # Processes all pending events and updates BACKLOG.md on the backlog branch.
  # Debounced: waits 60s on event triggers so rapid bursts collapse to one run.
  # Concurrency cancel-in-progress ensures only the latest surviving run processes.
  process:
    concurrency:
      group: update-backlog
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/checkout@v4
        with:
          ref: backlog
          path: backlog-branch

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Debounce (event-triggered runs only)
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        run: sleep 60

      - name: Seed backlog files for script
        run: |
          cp backlog-branch/BACKLOG.md BACKLOG.md 2>/dev/null || true
          cp backlog-branch/BACKLOG-UPDATES.md BACKLOG-UPDATES.md 2>/dev/null || true

      - name: Update backlog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install omegaconf
          python .claude/skills/update-backlog/scripts/update_backlog.py \
            --snapshot-path backlog-branch/last_snapshot.json \
            --event-log-path backlog-branch/events.jsonl \
            --commit-msg-path /tmp/backlog_commit_msg.txt

      - name: Commit to backlog branch
        run: |
          cp BACKLOG.md backlog-branch/BACKLOG.md
          [ -f BACKLOG-UPDATES.md ] && cp BACKLOG-UPDATES.md backlog-branch/BACKLOG-UPDATES.md || true
          cd backlog-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BACKLOG.md BACKLOG-UPDATES.md last_snapshot.json events.jsonl
          git diff --cached --quiet && exit 0
          COMMIT_MSG=$(cat /tmp/backlog_commit_msg.txt 2>/dev/null || echo "backlog: sync [skip ci]")
          git commit -m "$COMMIT_MSG"
          for i in 1 2 3; do
            git pull --rebase origin backlog && git push && break
            sleep $((i * 3))
          done
