[tool.black]
exclude = '''
(
  /(
      \.eggs         # exclude a few common directories in the
    | \.git          # root of the project
    | \.mypy_cache
    | omegaconf/grammar/gen
    | omegaconf/vendor
    | \.nox
    | build
    | subprojects
    | temp
    | vendor
  )
)
'''

[tool.isort]
skip_glob = ["temp/*", "omegaconf/vendor/*", "subprojects/*"]

[tool.pytest.ini_options]
addopts = "--import-mode=append -Werror"
pythonpath = ["."]
norecursedirs = ["subprojects"]

[tool.bumpversion]
current_version = "2.4.0.dev10"
parse = '''(?x)
    (?P<major>\d+)
    \.(?P<minor>\d+)
    \.(?P<patch>\d+)
    (?:
        \.(?P<pre_l>dev)
        (?P<pre_n>\d+)
    )?
'''
serialize = [
    "{major}.{minor}.{patch}.{pre_l}{pre_n}",
    "{major}.{minor}.{patch}",
]
search = '{current_version}'
replace = '{new_version}'
regex = false
ignore_missing_version = false
tag = false
sign_tags = false
allow_dirty = false
commit = false

[tool.bumpversion.parts.pre_l]
values = ["final", "dev"]
optional_value = "final"

[tool.bumpversion.parts.pre_n]
first_value = "0"

[[tool.bumpversion.files]]
filename = "omegaconf/version.py"

[[tool.bumpversion.files]]
filename = "subprojects/omegaconf-pydevd/version.py"

[tool.towncrier]
    package = "omegaconf"
    package_dir = ""
    filename = "NEWS.md"
    directory = "news/"
    title_format = "## {version} ({project_date})"
    template = "news/_template.rst"
    issue_format = "[#{issue}](https://github.com/omry/omegaconf/issues/{issue})"
    start_string = "<!-- TOWNCRIER -->\n"
    underlines = [""]

  [[tool.towncrier.type]]
  directory = "feature"
  name = "Features"
  showcontent = true

  [[tool.towncrier.type]]
  directory = "bugfix"
  name = "Bug Fixes"
  showcontent = true

  [[tool.towncrier.type]]
  directory = "api_change"
  name = "API changes and deprecations"
  showcontent = true

  [[tool.towncrier.type]]
  directory = "docs"
  name = "Improved Documentation"
  showcontent = true

  [[tool.towncrier.type]]
  directory = "misc"
  name = "Miscellaneous changes"
  showcontent = true
